<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #0D1117;
      color: #F0F6FC;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .workflow-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .workflow-desc {
      font-size: 12px;
      opacity: 0.7;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.15); }
  </style>
</head>
<body>
  <div class="logo">Hoff</div>
  <div class="workflow-name">Create a New Repository</div>
  <div class="workflow-desc">Learn how to create a new repository to host your project.</div>
  <button id="start-btn">Start Onboarding</button>
  <script src="popup.js"></script>
</body>
</html>

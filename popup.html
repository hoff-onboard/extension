<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #0D1117;
      color: #F0F6FC;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.5;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      background: #161B22;
      color: #F0F6FC;
      border: 1px solid #30363D;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 14px;
      cursor: pointer;
    }
    .workflow-info {
      margin-bottom: 14px;
      padding: 10px;
      background: #161B22;
      border-radius: 6px;
      min-height: 48px;
    }
    .workflow-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .workflow-desc {
      font-size: 12px;
      opacity: 0.7;
      line-height: 1.4;
    }
    .step-count {
      font-size: 11px;
      opacity: 0.4;
      margin-top: 6px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.15); }
    button:disabled { opacity: 0.4; cursor: default; filter: none; }
    .empty { font-size: 12px; opacity: 0.5; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="logo">Hoff</div>
  <div id="content">
    <div class="empty">Loading flows...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
